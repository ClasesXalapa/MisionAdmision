<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#155EEF">
  <title>Sin conexión · Misión Admisión</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7f9fc; color: #14213d; }
    main { width: min(88vw, 520px); padding: 32px; border-radius: 24px; background: white; box-shadow: 0 18px 50px rgba(20, 33, 61, .12); }
    h1 { margin: 0 0 12px; font-size: 1.8rem; }
    p { line-height: 1.55; color: #4a5568; }
    button { width: 100%; margin-top: 16px; border: 0; border-radius: 14px; padding: 14px 18px; color: white; background: #155eef; font: inherit; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>No hay conexión</h1>
    <p>Esta página todavía no está guardada en el dispositivo. Conéctate una vez, abre Misión Admisión y espera a que aparezca “Modo offline preparado”.</p>
    <button type="button" onclick="window.location.reload()">Intentar de nuevo</button>
  </main>
</body>
</html>
